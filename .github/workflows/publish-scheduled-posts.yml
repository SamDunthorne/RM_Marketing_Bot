name: Publish scheduled posts

on:
  schedule:
    # Runs every 30 minutes. Adjust to match config/config.yaml's check_interval_minutes.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        working-directory: scripts
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          IMAGE_BASE_URL: ${{ vars.IMAGE_BASE_URL }}
        run: python scheduler.py

      - name: Commit updated post status
        run: |
          git config user.name "roofmaster-marketing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet || git commit -m "Update post status [skip ci]"
          git push
